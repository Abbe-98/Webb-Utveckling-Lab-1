<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>MathRush</title>
  <link rel="icon" type="image/x-icon" href="Icons/math-48.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">

<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
/>


  <!-- Load JS after HTML is parsed -->
  <script defer src="index.js"></script>
</head>
<body>

    <!-- Left Menu -->
  <nav class="menu">
    <a href="#high_scores" onclick="showPage('high_scores')"><i class="fa-solid fa-web-awesome"></i><br>High Scores</a>
    <a href="#settings" onclick="showPage('settings')"><i class="fa-solid fa-gear"></i><br>Settings</a>
  </nav>

  <!-- Right Content -->
  <main class="content">
    <div id="Main_Menu" class="page active">
    <!--<h1>Main Menu</h1>
    <p>Start the game, pick a mode, etc.</p>    </div>-->
    <div id="instructions" class="page">
    <h1>Instructions</h1>
    <ol>
      <li>Use arrows/WASD to move</li>
      <li>Press space to jump</li>
      <li>Collect coins, avoid spikes</li>
    </ol>    </div>
    <div id="high_scores" class="page">
    <h1>High Scores</h1>
    <ul id="scores-list">
      <li>Ada — 12000</li>
      <li>Linus — 9800</li>
    </ul>    </div>
    <div id="settings" class="page">
    <h1>Settings</h1>
    <label>
      Sound
      <input type="checkbox" checked>
    </label>    </div>
  </main>

  <footer class="footer">
    <a href="#instructions" onclick="showPage('instructions')"><i class="fa-solid fa-lightbulb"></i><br>Instructions</a>
    <a href="#Main_Menu" onclick="showPage('Main_Menu')"><i class="fa-solid fa-house"></i><br>Main Menu</a>
  </footer>
</body>
</html>
